name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set deploy environment
        id: env
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [ "$BRANCH" = "main" ]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "uat" ]; then
            echo "DEPLOY_ENV=uat" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_OUTPUT
          fi

      - name: Run build
        env:
          VITE_REPO_NAME: ${{ github.event.repository.name }}
          VITE_DEPLOY_ENV: ${{ steps.env.outputs.DEPLOY_ENV }}
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.env.outputs.DEPLOY_ENV }}
          path: dist
          retention-days: 1

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    environment:
      name: dev
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dev
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-dev
          path: dist

      - name: Deploy to GitHub Pages (DEV)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          commit_message: "deploy(dev): ${{ github.sha }}"

  deploy-uat:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/uat'
    environment:
      name: uat
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/uat
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-uat
          path: dist

      - name: Deploy to GitHub Pages (UAT)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
