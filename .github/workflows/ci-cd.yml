name: Build and Deploy Vite App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Stop and remove old container
        run: |
          docker stop my-vite-app || true
          docker rm my-vite-app || true

      - name: Remove old image
        run: docker rmi my-vite-app || true

      - name: Build Docker image
        run: docker build -t my-vite-app .

      - name: Run new container
        run: docker run -d --name my-vite-app -p 80:80 my-vite-app