server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed Vite assets
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
