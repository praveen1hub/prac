name: Docker Build and Push

on:
  push:
    branches:
      - main
      - uat
      - dev

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment tag
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [ "$BRANCH" = "main" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
          elif [ "$BRANCH" = "uat" ]; then
            echo "IMAGE_TAG=uat" >> $GITHUB_ENV
            echo "DEPLOY_ENV=uat" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ncart-react:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_REPO_NAME=${{ github.event.repository.name }}
            VITE_DEPLOY_ENV=${{ env.DEPLOY_ENV }}