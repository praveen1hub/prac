name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set deploy environment
        id: env
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if   [ "$BRANCH" = "main" ]; then DEPLOY_ENV="prod"
mkdir -p .github/workflows

cat > .github/workflows/ci-cd.yml << 'EOF'
