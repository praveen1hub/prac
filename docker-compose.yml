name: Docker Build & Push
on:
  push:
    branches:
      - main      # prod
      - uat        # uat
      - dev        # dev
  pull_request:
    branches:
      - main

  env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ncart-react

  jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Determine environment tag from branch
      - name: Set environment tag
        id: env_tag
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DEPLOY_ENV=prod"  >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "uat" ]]; then
            echo "DEPLOY_ENV=uat"   >> $GITHUB_ENV
            echo "IMAGE_TAG=uat"    >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev"   >> $GITHUB_ENV
            echo "IMAGE_TAG=dev"    >> $GITHUB_ENV
          fi

      # 3. Set up QEMU (multi-platform support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Extract metadata (tags & labels)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,prefix=${{ env.IMAGE_TAG }}-,format=short

      # 7. Build & push
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_REPO_NAME=${{ vars.VITE_REPO_NAME || 'prac' }}
            VITE_DEPLOY_ENV=${{ env.DEPLOY_ENV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Print image digest
      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"